<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastConvert - Premium</title>
    <style>
        body {
            background-color: #0d1117;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            text-align: center;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 60px;
        }

        .logo-container img {
            max-height: 60px;
            width: auto;
            display: block;
        }

        .nav-links a {
            color: #8b949e;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 14px;
            font-weight: 600;
            margin-left: 25px;
        }

        .converter-section {
            display: flex;
            flex-direction: column;
            gap: 40px;
            width: 100%;
            max-width: 900px;
            padding: 0 20px;
        }

        h1 { font-size: 40px; font-weight: 700; margin: 0; }
        .subtitle { font-size: 18px; color: #8b949e; margin-top: -20px; }

        .converter-input-group {
            display: flex;
            gap: 15px;
            background-color: #161b22;
            padding: 10px;
            border-radius: 60px;
            border: 1px solid #30363d;
            align-items: center;
        }

        input {
            flex-grow: 1;
            background: transparent;
            border: none;
            padding: 15px 25px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        select {
            background-color: #21262d;
            border: none;
            border-radius: 60px;
            color: white;
            padding: 15px 20px;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        /* LE BOUTON OK (Lien vers la vidéo) */
        .ok-btn {
            background-color: #00d4ff;
            color: #0d1117;
            text-decoration: none; /* Indispensable pour enlever le trait de lien */
            border-radius: 60px;
            padding: 15px 45px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s ease;
            display: inline-block;
        }

        .ok-btn:hover {
            background-color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        .helper-text { color: #484f58; font-size: 14px; }

        @media (max-width: 768px) {
            header { padding: 20px; }
            .converter-input-group { flex-direction: column; border-radius: 25px; }
            .ok-btn, select, input { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://xpdevapps.github.io/mokievideos/hdddd9.jpg" alt="Logo" onerror="this.style.opacity='0'">
        </div>
        <nav class="nav-links">
            <a href="https://xpdevapps.github.io/mokievideos/legal_mention_videconvert1.html">Contact</a>
        </nav>
    </header>

    <main class="converter-section">
        <h1>Prêt pour le téléchargement ?</h1>
        <p class="subtitle">Insérez votre lien ci-dessous pour une conversion HD immédiate.</p>

        <div class="converter-input-group">
            <input type="text" placeholder="Collez le lien de la vidéo ici...">
            
            <select>
                <optgroup label="Vidéo (MP4)">
                    <option>MP4 - 144p</option>
                    <option>MP4 - 240p</option>
                    <option>MP4 - 360p</option>
                    <option>MP4 - 480p</option>
                    <option selected>MP4 - 1080p HD</option>
                    <option>MP4 - 1440p (2K)</option>
                    <option>MP4 - 4K</option>
                    <option>MP4 - 8K</option>
                </optgroup>
                <optgroup label="Audio (MP3)">
                    <option>MP3 - 64 kbps</option>
                    <option>MP3 - 128 kbps</option>
                    <option>MP3 - 192 kbps</option>
                    <option>MP3 - 256 kbps</option>
                    <option>MP3 - 320 kbps</option>
                </optgroup>
            </select>

            <a href="https://xpdevapps.github.io/mokievideos/video_converted1.zip" class="ok-btn">OK</a>
        </div>

        <p class="helper-text">Le traitement prend généralement 2 à 3 secondes.</p>
    </main>

</body>
</html>
